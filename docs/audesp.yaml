    JSON_Edital:
      type:
        object
      properties:
        descritor:
          type: object
          properties:
            municipio:
              description: Municipio
              type: integer
              minimum: 1
              maximum: 9999
            entidade:
              description: Entidade
              type: integer
              minimum: 1
              maximum: 99999
            ano:
              description: Ano
              type: integer
            codigoEdital:
              description: Código único que identifica o Edital original
              type: string
              maxLength: 20
            dataPublicacao:
              description: Data da Publicação deste Edital ou desta Retificação de Edital
              type: string
              format: date
            retificacao:
              description: >-
                Identifica se o documento é uma retificação; true - Retificação; false
                - Não é retificação
              type: boolean
          required:
            - municipio
            - entidade
            - ano
            - codigoEdital
            - dataPublicacao
            - retificacao
          additionalProperties: false
        codigoUnidadeCompradora:
          description: >-
            Código da unidade; A unidade deverá estar cadastrada para o órgão
            originário da contratação (proprietário da contratação ou alienação de
            bens)
          type: string
          maxLength: 20
        tipoInstrumentoConvocatorioId:
          description: Tipo de instrumento Convocatório
          type: integer
          enum:
            - 1
            - 2
            - 3
        modalidadeId:
          description: Modalidade de Compra/Contratação
          type: integer
          enum:
            - 2
            - 3
            - 4
            - 5
            - 6
            - 7
            - 8
            - 9
            - 12
            - 13
            - 15
            - 16
        modoDisputaId:
          description: Modo de disputa
          type: integer
          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
        numeroCompra:
          description: >-
            Número da contratação no sistema de origem sem o ano. Esse número é gerado
            pelo usuário no seu sistema de origem (ex. Pregão 14)
          type: string
          maxLength: 50
        anoCompra:
          description: >-
            Ano da contratação. Esse é o ano relacionado ao número da contratação.
            (Ex: 2021)
          type: integer
        numeroProcesso:
          description: Número do processo de contratação no sistema de origem
          type: string
          maxLength: 50
        objetoCompra:
          description: Objeto da contratação
          type: string
          maxLength: 5120
        informacaoComplementar:
          description: Informações complementares; Se houver;
          type: string
          maxLength: 5120
        srp:
          description: Identifica se a compra trata-se de um SRP (Sistema de registro de preços).
          type: boolean
        dataAberturaProposta:
          description: >-
            data e hora de início do recebimento das propostas (pelo horário de
            Brasília)
          type: string
          format: date-time
        dataEncerramentoProposta:
          description: >-
            data e hora de encerramento do recebimento das propostas (pelo horário de
            Brasília)
          type: string
          format: date-time
        amparoLegalId:
          description: Amparo legal para dispensa ou inexigibilidade
          type: integer
        linkSistemaOrigem:
          description: url do sistema de origem para envio de proposta/lance
          type: string
          minimum: 1
          maxLength: 500
        justificativaPresencial:
          description: justificativa pela escolha da modalidade presencial
          type: string
          minimum: 1
          maxLength: 500
        itensCompra:
          description: Lista de itens da contratação
          type: array
          items:
            description: Item da contratação
            type: object
            required:
              - numeroItem
              - materialOuServico
              - tipoBeneficioId
              - incentivoProdutivoBasico
              - descricao
              - quantidade
              - unidadeMedida
              - orcamentoSigiloso
              - valorUnitarioEstimado
              - valorTotal
              - criterioJulgamentoId
              - itemCategoriaId
              - patrimonio
              - codigoRegistroImobiliario
            additionalProperties: false
            properties:
              numeroItem:
                description: Número do item na contratação (único e sequencial crescente)
                type: integer
              materialOuServico:
                description: M - Material; S - Serviço
                type: string
                minLength: 1
                maxLength: 1
              tipoBeneficioId:
                description: Tipo de benefício
                type: integer
                enum:
                  - 1
                  - 2
                  - 3
                  - 4
                  - 5
              incentivoProdutivoBasico:
                description: >-
                  Incentivo fiscal PPB (Processo Produtivo Básico); true - Possui o
                  incentivo; false - Não possui o incentivo;
                type: boolean
              descricao:
                description: Descrição para o produto ou serviço
                type: string
                minLength: 1
                maxLength: 2048
              quantidade:
                description: >-
                  Quantidade do item da contratação. Precisão de 4 dígitos decimais;
                  Ex: 100.0000
                type: number
              unidadeMedida:
                description: Unidade de medida do item da contratação
                type: string
                minLength: 1
                maxLength: 30
              orcamentoSigiloso:
                description: >-
                  Identifica se o orçamento do item é sigiloso; true - Sigiloso; false
                  - Não sigiloso
                type: boolean
              valorUnitarioEstimado:
                description: >-
                  Valor unitário estimado para o item da contratação. Precisão de 4
                  dígitos decimais; Ex: 100.0000
                type: number
              valorTotal:
                description: >-
                  Valor total para contratação tradicional. Precisão de 4 dígitos
                  decimais; Ex: 100.0000
                type: number
              criterioJulgamentoId:
                description: Critério de julgamento
                type: integer
                enum:
                  - 1
                  - 2
                  - 4
                  - 5
                  - 6
                  - 7
                  - 8
                  - 9
              itemCategoriaId:
                description: >-
                  Categoria do item. Domínios 1 ou 2 aplicados à modalidade leilão.
                  Outras modalidades de contratação utilizar o domínio 3. Domínio: 1 –
                  Bens Imóveis; 2 – Bens Móveis; 3 - Não se aplica
                type: integer
                enum:
                  - 1
                  - 2
                  - 3
              patrimonio:
                description: Código de Patrimonio do Item de bens móveis quando existir.
                type: string
                minLength: 1
                maxLength: 255
              codigoRegistroImobiliario:
                description: Código de Registro Imobiliário
                type: string
                minLength: 1
                maxLength: 255
