  /f4/consulta/{protocolo}:
    get:
      tags:
        - Consulta
      summary: Consultar documento da Fase IV
      description: Consulta a situação de documentos prestados da Fase IV pelo número do protocolo.
      parameters:
        - in: header
          name: Authorization
          description: Token de acesso precedido do prefixo 'Bearer', conforme exemplo abaixo.
          required: true
          schema:
            type: string
            format: jwt
          examples:
            Authorization:
              $ref: '#/components/examples/Authorization'
        - in: path
          description: Número do protocolo a ser consultado.
          required: true
          name: protocolo
          schema:
            type: string
          example: 'F4EDT71071004801'
      responses:
        '200':
          description: Situação do protocolo consultada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaConsultaOKFaseIV'
              examples:
                Status - Recebido:
                  $ref: '#/components/examples/ConsultaStatusRecebido'
                Status - Rejeitado:
                  $ref: '#/components/examples/f4/ConsultaStatusRejeitado'
                Status - Armazenado:
                  $ref: '#/components/examples/f4/ConsultaStatusArmazenado'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Bad Request:
                  $ref: '#/components/examples/Erro400'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Unauthorized:
                  $ref: '#/components/examples/Erro401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Forbidden:
                  $ref: '#/components/examples/Erro403'
        '404':
