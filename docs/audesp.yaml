openapi: 3.0.0
info:
  title: Sistema Audesp 
  description: |
    ![Logo-Audesp](https://www.tce.sp.gov.br/sites/default/files/inline-images/logo_audesp.png)
    
    APIs do Sistema Audesp para a prestação e consulta de dados.
    
    **Mais informações**: [https://www.tce.sp.gov.br/audesp](https://www.tce.sp.gov.br/audesp)
    
    **Tirar dúvidas**: [Abrir protocolo](https://www4.tce.sp.gov.br/chamados/open.php?1lid=10) (Selecione a opção "2.01. Audesp" em _Área de atuação_ e a opção "Audesp / Fase V - Dúvidas/críticas/sugestões dos jurisdicionados" em _Objeto_).
    
    **Suporte técnico aos sistemas**: [Abrir protocolo](https://www4.tce.sp.gov.br/chamados/open.php?1lid=9) (Selecione a opção "2.01. Audesp" em _Área de atuação_ e a opção "Audesp / Fase V - Falhas técnicas que precisam de avaliação para correção" em _Objeto_). 
    
    **Atendimento telefônico**: [(11) 3292-4321](tel:551132924321) 
    
  version: "1.17.0"

servers:
  - url: https://audesp-piloto.tce.sp.gov.br
    description: Ambiente piloto para testes
  - url: https://audesp.tce.sp.gov.br
    description: Ambiente oficial para prestação de dados

tags:
  - name: Autenticação
    description: Autenticação para acesso aos serviços
  - name: Consulta
    description: Consulta situação de documentos prestados
  - name: Fase IV
    description: Prestação de dados de Licitações e Contratos
  - name: Fase V
    description: Prestação de dados de Repasses ao Terceiro Setor

paths:
  /login:
    post:
      tags:
        - Autenticação
      summary: Obter token de acesso
      description: Obtenção de token para acesso aos demais serviços.
      parameters:
        - name: x-authorization
          in: header
          required: true
          description: E-Mail do usuário e senha de acesso ao Portal de Sistemas do TCESP. O e-mail e a senha devem ser separados por dois pontos (:), conforme exemplo abaixo.
          schema: 
            type: string
            format: email:$password
            example: "usuario@email.com:senha"
      responses:
        '200':
          description: Autenticação realizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
              examples:
                Token:
                  $ref: '#/components/examples/Token'
                    
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Bad Request:
                  $ref: '#/components/examples/Erro400'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Unauthorized:
                  $ref: '#/components/examples/Erro401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Forbidden:
                  $ref: '#/components/examples/Erro403'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Not Found:
                  $ref: '#/components/examples/Erro404'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Internal Server Error:
                  $ref: '#/components/examples/Erro500'


  /recepcao-fase-4/f4/enviar-edital:
    post:
      tags:
        - Fase IV
      summary: Enviar edital de licitação
      description: |
        Envio de editais de licitação. O edital deve ser enviado em arquivo PDF e incluir metadados em formato JSON respeitando o schema proposto no documento abaixo.
        
        Obs.: Não é permitido o envio de arquivos com mais de 30MB.
        
        _JSON Schemas e mais informações_: [AUDESP - Licitações e Contratos - JSON/Schemas](https://www.tce.sp.gov.br/audesp/documentacao/reformulacao-fase-iv-jsonschemas-e-documentacao-xlsx)
      
      parameters:
        - in: header
          name: Authorization
          description: Token de acesso precedido do prefixo 'Bearer', conforme exemplo abaixo.
          required: true
          schema:
            type: string
            format: jwt
          examples:
            Authorization:
              $ref: '#/components/examples/Authorization'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                documentoJSON:
                  $ref: '#/components/schemas/JSON_Edital'
                arquivoPDF:
                  type: string
                  format: binary
              required: ['documentoJSON', 'arquivoPDF']
            encoding: 
              arquivo:
                contentType: application/pdf
      responses:
        '200':
          description: Envio realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaEnvioOK'
              examples:
                Envio com Sucesso:
                  $ref: '#/components/examples/DocumentoRecebidoSucesso'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaErro400DocInvalido'
              examples:
                Documento Inválido:
                  $ref: '#/components/examples/Erro400DocInvalido'
                Bad Request:
                  $ref: '#/components/examples/Erro400'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Unauthorized:
                  $ref: '#/components/examples/Erro401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Forbidden:
                  $ref: '#/components/examples/Erro403'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Not Found:
                  $ref: '#/components/examples/Erro404'
        '413':
          description: Request Entity Too Large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Request Entity Too Large:
                  $ref: '#/components/examples/Erro413'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespostaPadraoErro'
              examples:
                Internal Server Error:
                  $ref: '#/components/examples/Erro500'

