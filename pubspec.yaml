name: audesp_api
description: "Aplicativo desktop para envio de dados ao AUDESP - TCE-SP."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP client com interceptors
  dio: ^5.7.0

  # Seleção de PDF
  file_picker: ^11.0.2

  # Gerenciamento de estado
  flutter_riverpod: ^3.3.1

  # Roteamento declarativo
  go_router: ^17.2.0

  # Armazenamento seguro de senhas locais (DPAPI no Windows)
  flutter_secure_storage: ^10.0.0

  # Formatação de datas
  intl: ^0.20.2



  # Hash de senhas
  crypto: ^3.0.5

  # Integração com Google Gemini (importação de PDF via IA)
  google_generative_ai: ^0.4.6

  # Extração de texto de DOC/DOCX para envio ao Gemini
  docx_to_text: ^1.0.1

  # Modelos imutáveis + serialização
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Driver MySQL
  mysql_client: ^0.0.27

  # Leitura de planilhas XLSX
  excel: ^4.0.6

  # Manipulação de caminhos de arquivos
  path: ^1.9.1
  ini: ^2.1.0
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo_audesp.png
    - assets/logo_audesp2.png
