name: audesp_api
description: "Aplicativo desktop para envio de dados ao AUDESP - TCE-SP."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # ORM SQLite (desktop-first)
  drift: ^2.22.0
  drift_flutter: ^0.2.4

  # HTTP client com interceptors
  dio: ^5.7.0

  # Seleção de PDF
  file_picker: ^8.1.7

  # Gerenciamento de estado
  flutter_riverpod: ^2.6.1

  # Roteamento declarativo
  go_router: ^14.6.2

  # Armazenamento seguro de senhas locais (DPAPI no Windows)
  flutter_secure_storage: ^9.2.4

  # Formatação de datas
  intl: ^0.20.2

  # Variáveis de ambiente (.env)
  flutter_dotenv: ^5.2.1

  # Hash de senhas
  crypto: ^3.0.5

  # Modelos imutáveis + serialização
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  drift_dev: ^2.22.0

flutter:
  uses-material-design: true

  assets:
    - assets/.env
